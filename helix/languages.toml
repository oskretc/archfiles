
# https://github.com/netmute/ctags-lsp
[language-server.ctags-lsp]
command = "ctags-lsp"

# introduce new language server
# https://github.com/estin/simple-completion-language-server
[language-server.scls]
command = "simple-completion-language-server"

[language-server.scls.config]
max_completion_items = 20            # set max completion results len for each group: words, snippets, unicode-input
feature_words = true                 # enable completion by word
feature_snippets = false              # enable snippets
snippets_first = true                # completions will return before snippets by default
snippets_inline_by_word_tail = false # suggest snippets by WORD tail, for example text `xsq|` become `x^2|` when snippet `sq` has body `^2`
feature_unicode_input = false         # enable "unicode input"
feature_paths = false                 # enable path completion
feature_citations = false            # enable citation completion (only on `citation` feature enabled)


# write logs to /tmp/completion.log
[language-server.scls.environment]
RUST_LOG = "info,simple-completion-language-server=info"
LOG_FILE = "/tmp/completion.log"

[[language]]
name = "nxml"
scope = "source.nxml"
file-types = ["nxml"]
language-servers = ["nxml-lsp"]
grammar = "xml"

[language-server.nxml-lsp]

command = "${HOME}/gitrepos/nxml_gounmarshall/nxml-lsp"
args = ["lsp" , "-l", "${HOME}/gitrepos/nxml_gounmarshall/log_nxml-lsp.txt"]
# args = ["--stdio"]
# enviroment = {"NXML-LSP_LOG"= "${HOME}/gitrepos/nxml_gounmarshall/log_nxml-lsp.txt"}

# append language server to existed languages
[[language]]
name = "rust"
language-servers = [ "scls", "rust-analyzer" ]

[[language]]
name = "toml"
# language-servers = ["scls"]
language-servers = ["ctags-lsp"]

[[language]]
name = "xml"
file-types = ["xml", "svg", "xsd", "xslt", "xsl" ]
# file-types = ["nxml", "xml", "svg", "xsd", "xslt", "xsl" ]
# auto-format = true
# formatter = { command = "xmllint", args = ["--format", "-"] }
language-servers = [ "xml" ]
# language-servers = [ "xml","ctags-lsp" ]
[language-server.xml]
command = "lemminx"

[[language]]
name = "c-sharp"
scope = "source.csharp"
injection-regex = "c-?sharp"
file-types = ["cs", "csx", "cake"]
roots = ["sln", "csproj"]
# comment-tokens = ["//", "///"]
# block-comment-tokens = { start = "/*", end = "*/" }
indent = { tab-width = 4, unit = "\t" }
language-servers = [ "omnisharp" ]
[language-server.omnisharp]
command = "${HOME}/tmp/omnisharp/OmniSharp"
args = [ "--languageserver" ]

[[language]]
name = "c"
language-servers = ["scls","ctags-sp"]



[[language]]
name= "php"
scope = "source.php"
injection-regex = "php"
file-types = ["php", "inc", "php4", "php5", "phtml", "ctp"]
shebangs = ["php"]
roots = ["composer.json", "index.php"]
comment-token = "//"
language-servers = ["scls", "intelephense" ]
indent = { tab-width = 4, unit = "    " }

[[language]]
name = "sql"
scope = "source.sql"
language-servers = ["sqls"]


[language-server.sqls]
command = "sqls"
# args = ["-t", "-l", "${HOME}/tmp/sqls.log"]

# https://github.com/erasin/hx-lsp
[language-server.hx-lsp]
command = "hx-lsp"

######## GO #####################
[[language]]
name = "go"
auto-format = true
formatter = { command = "goimports" }
# language-servers = ["scls", "gopls"]
# language-servers = ["scls", "gopls", "llm-lsp"]
language-servers = ["hx-lsp","scls", "gopls", "llm-lsp"]
# language-servers = ["hx-lsp","scls", "gopls", "lsp-ai"]
# language-servers = ["gopls"]

[language-server.gopls]
command = "gopls"

[language-server.gopls.config.hints]
assignVariableTypes = true
compositeLiteralFields = true
constantValues = true
functionTypeParameters = true
parameterNames = true
rangeVariableTypes = true
#################################
#################################
# https://github.com/rosarp/llm-lsp
[language-server.llm-lsp]
command = "llm-lsp"
args = ["server", "-p", "codeium"]
#################################

[[language]]
name = "make"
scope = "source.make"
file-types = [{ glob = "Makefile" }, { glob = "makefile" }, "make", "mk", "mak", {glob = "GNUmakefile" }, { glob = "OCamlMakefile" }]
shebangs = ["make", "gmake"]
injection-regex = "(make|makefile|Makefile|mk)"
comment-token = "#"
indent = { tab-width = 4, unit = "\t" }
language-servers = ["ctags-lsp", "scls"]

[[language]]
name = "markdown"
formatter = { command = 'prettier', args = ["--parser", "markdown"] }
language-servers = ["markdown-oxide", "lsp-ai"]

[[language]]
name = "html"
formatter = { command = 'prettier', args = ["--parser", "html"] }
language-servers = ["ctags-lsp"]

[[language]]
name = "json"
formatter = { command = 'prettier', args = ["--parser", "json"] }
language-servers = ["ctags-lsp", "lsp-ai"]

[[language]]
name = "css"
formatter = { command = 'prettier', args = ["--parser", "css"] }
language-servers = ["ctags-lsp"]

# [[language]]
# name = "javascript"
# formatter = { command = 'prettier', args = ["--parser", "typescript"] }
# auto-format = true
# language-servers = ["ctags-lsp"]
[[language]]
name = "javascript"
scope = "source.js"
injection-regex = "(js|javascript)"
language-id = "javascript"
file-types = ["js", "mjs", "cjs", "rules", "es6", "pac", "gs", { glob = ".node_repl_history" }, { glob = "jakefile" }]
shebangs = ["node"]
roots = [ "package.json", "jsconfig.json" ]
comment-token = "//"
block-comment-tokens = { start = "/*", end = "*/" }
language-servers = [ "typescript-language-server" ]
indent = { tab-width = 2, unit = "  " }


[[language]]
name = "typescript"
scope = "sources.ts"
injection-regex = "(ts|typescript)"
language-id = "typescript"
file-types = ["ts", "mts", "cts"]
shebangs = ["deno", "bun", "ts-node"]
roots = [ "package.json", "tsconfig.json" ]
comment-token = "//"
block-comment-tokens = { start = "/*", end = "*/" }
language-servers = [ "typescript-language-server" ]
indent = { tab-width = 2, unit = "  " }
formatter = { command = 'prettier', args = ["--parser", "typescript"] }
auto-format = true
# language-servers = ["ctags-lsp"]

[[grammar]]
name = "typescript"
source = { git = "https://github.com/tree-sitter/tree-sitter-typescript", rev = "75b3874edb2dc714fb1fd77a32013d0f8699989f", subpath = "typescript" }

[[language]]
name = "tsx"
formatter = { command = 'prettier', args = ["--parser", "typescript"] }
auto-format = true
language-servers = ["ctags-lsp"]

[[language]]
name = "yaml"
formatter = { command = 'prettier', args = ["--parser", "yaml"] }
auto-format = true
language-servers = ["ctags-lsp"]

[[language]]
name = "python"
language-servers = ["ruff", "jedi", "llm-lsp"]


##############################
## Configuration for lsp-ai ##
##############################

[language-server.lsp-ai]
command = "lsp-ai"
args = ["--config","${HOME}/.config/helix/lsp-ai-gemini.json"]


[[language]]
name = "groovy"
language-id = "groovy"
scope = "source.groovy"
file-types = ["gradle", "groovy", "jenkinsfile", { glob = "Jenkinsfile" },  { glob = "Jenkinsfile.*" }]
shebangs = ["groovy"]
comment-token = "//"
indent = { tab-width = 2, unit = "  " }

[[grammar]]
name = "groovy"
source = { git = "https://github.com/murtaza64/tree-sitter-groovy", rev = "235009aad0f580211fc12014bb0846c3910130c1" }

[[language]]
name = "csv"
file-types = ["csv"]
scope = "source.csv"

[[grammar]]
name = "csv"
source.git = "https://github.com/weartist/rainbow-csv-tree-sitter"
source.rev = "896e6d09b23a1b0d87e45bf97ca34a249f41495c"

# svelte
[language-server.svelteserver]
command = "svelteserver"
args = ["--stdio"]

[language-server.svelteserver.config.configuration.typescript]
inlayHints.parameterTypes.enabled = true
inlayHints.variableTypes.enabled = true
inlayHints.propertyDeclarationTypes.enabled = true
inlayHints.functionLikeReturnTypes.enabled = true
inlayHints.enumMemberValues.enabled = true
inlayHints.parameterNames.enabled = "all"

[language-server.svelteserver.config.configuration.javascript]
inlayHints.parameterTypes.enabled = true
inlayHints.variableTypes.enabled = true
inlayHints.propertyDeclarationTypes.enabled = true
inlayHints.functionLikeReturnTypes.enabled = true
inlayHints.enumMemberValues.enabled = true
inlayHints.parameterNames.enabled = "all"
[[language]]
name = "svelte"
scope = "source.svelte"
injection-regex = "svelte"
file-types = ["svelte"]
indent = { tab-width = 2, unit = "  " }
comment-token = "//"
block-comment-tokens = { start = "/*", end = "*/" }
language-servers = [ "svelteserver" ]

[[grammar]]
name = "svelte"
source = { git = "https://github.com/tree-sitter-grammars/tree-sitter-svelte", rev = "ae5199db47757f785e43a14b332118a5474de1a2" }

