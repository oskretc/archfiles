packages:
    core: 
        pacman: [atuin, eza, duf,  yazi, git-delta, intelli-shell, lazygit, pass, python-pip, python-pipx, skm, restic, scooter, stow, zoxide, zellij, dra, television, gopass ] 
        when: {distro: [CachyOS]}
    core-deb:
        brew: [helix,yazi, git-delta, atuin, eza, duf,  intelli-shell, lazygit, pass,   restic, scooter, stow, zoxide, pipx, dra, television, gopass  ] 
        go: ['github.com/TimothyYe/skm/cmd/skm']
        when: {distro: [debian, ubuntu]}
    gui-linux:
        pacman: [browserpass, browserpass-chromium, google-chrome, helium-browser-bin, nautilus,nautilus-open-any-terminal, vicinae-bin, wezterm, wayvnc]
        when: {distro: [CachyOS]}
    withdocking:
        pacman: [ddcutil, displaylink, i2c-tools]
    deving:
        npm: ['@google/gemini-cli']
        go: ['golang.org/x/tools/gopls@latest', 'github.com/xaaha/hulak@latest']
        
    
